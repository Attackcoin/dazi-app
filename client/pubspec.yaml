name: dazi_app
description: "搭子 App — 找个人一起出发"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Search (Algolia 官方 Dart helper)
  algolia_helper_flutter: 1.6.0

  # Navigation
  go_router: ^14.6.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.5
  firebase_database: ^11.1.6
  cloud_functions: ^5.1.4

  # Image / Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # URL
  url_launcher: ^6.3.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.11
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  integration_test:
    sdk: flutter
  # 用于 integration_test 读取 Firebase Auth emulator 的 verificationCodes REST 端点
  http: ^1.2.2

# 强制 geolocator_android 降到 4.x —— 5.0.2 调用了 Color.toARGB32()，
# 该 API 需要比当前 Flutter 3.27.4 更新的 SDK。J0..J4 不依赖定位功能，
# 留到升级 Flutter SDK 后再去掉这个 override。
dependency_overrides:
  geolocator_android: ^4.6.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FF6B9D"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
