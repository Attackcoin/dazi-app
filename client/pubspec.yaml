name: dazi_app
description: "搭子 App — 找个人一起出发"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.5
  firebase_database: ^11.1.6
  cloud_functions: ^5.1.4

  # Image / Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.11
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
